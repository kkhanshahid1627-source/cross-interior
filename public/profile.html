<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Cross Interior</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="gradient-bg">

  <nav>
    <a href="index.html" class="logo text-light">Cross <span class="accent-text">Interior</span></a>
    <button class="hamburger" onclick="this.classList.toggle('active'); document.querySelector('nav ul').classList.toggle('mobile-open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="index.html" class="text-light">Shop</a></li>
      <li><a href="cart.html" class="text-light">Cart</a></li>
      <li><button class="btn btn-outline" style="padding: 8px 15px" onclick="localStorage.clear(); window.location='login.html'">Logout</button></li>
    </ul>
  </nav>

  <div class="profile-container">
    <!-- Profile Card -->
    <div class="glass-dark" style="padding: 40px; border-radius: 20px; margin-bottom: 30px;">
      <h2 style="margin-bottom: 20px;">My <span class="accent-text">Profile</span></h2>
      <div id="profileInfo">
        <p>Loading...</p>
      </div>
      <div style="margin-top: 20px;">
        <div class="input-group">
          <label>Update Name</label>
          <input type="text" id="editName" placeholder="New name">
        </div>
        <button class="btn" onclick="updateProfile()">Save Changes</button>
      </div>
    </div>

    <!-- Wishlist -->
    <div class="glass-dark" style="padding: 40px; border-radius: 20px; margin-bottom: 30px;">
      <h2 style="margin-bottom: 20px;">My <span class="accent-text">Wishlist</span> ❤️</h2>
      <div class="grid" id="wishlistGrid" style="padding:0;">
        <p>Loading wishlist...</p>
      </div>
    </div>
    
    <!-- Change Password -->
    <div class="glass-dark" style="padding: 40px; border-radius: 20px; margin-bottom: 30px;">
      <h2 style="margin-bottom: 20px;">Security <span class="accent-text">Settings</span></h2>
      <div class="input-group">
        <label>Current Password</label>
        <input type="password" id="cp_current" placeholder="Enter current password">
      </div>
      <div class="input-group">
        <label>New Password</label>
        <input type="password" id="cp_new" placeholder="Enter new password (min 6 characters)">
      </div>
      <button class="btn" onclick="changePassword()">Change Password</button>
    </div>

    <!-- Order History -->
    <h2 style="margin-bottom: 20px;">Order <span class="accent-text">History</span></h2>
    <div id="ordersList">
      <p>Loading orders...</p>
    </div>
  </div>

  <div id="notification"></div>

  <script>
    const token = localStorage.getItem('token');
    if(!token) window.location = 'login.html';

    function showNotification(msg) {
      const notif = document.getElementById('notification');
      notif.textContent = msg;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 3000);
    }

    async function loadProfile() {
      try {
        const res = await fetch("/api/auth/me", { headers: { "auth-token": token } });
        const user = await res.json();
        
        document.getElementById('profileInfo').innerHTML = `
          <p style="font-size: 22px; font-weight: 600;">${user.name}</p>
          <p style="color: #aaa;">${user.email}</p>
          <span class="badge" style="margin-top: 10px;">${user.role || 'user'}</span>
        `;
        document.getElementById('editName').value = user.name;

        // Render Wishlist
        const wlGrid = document.getElementById('wishlistGrid');
        if(user.wishlist && user.wishlist.length > 0) {
          wlGrid.innerHTML = user.wishlist.map(p => `
            <div class="product-card glass" style="position:relative;">
              <a href="product.html?id=${p._id}">
                <img src="${p.image}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1586023492125-27b2c045efd7'">
              </a>
              <h3 style="margin-bottom: 5px;">${p.name}</h3>
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="price-tag">₹${p.price}</span>
                <button class="btn btn-outline" style="padding:6px 12px; font-size:12px;" onclick="removeFromWishlist('${p._id}')">Remove ❌</button>
              </div>
            </div>
          `).join('');
        } else {
          wlGrid.innerHTML = '<p style="grid-column:1/-1; color:#aaa;">Your wishlist is empty.</p>';
        }

      } catch(err) {
        showNotification("Failed to load profile");
      }
    }

    async function updateProfile() {
      const newName = document.getElementById('editName').value;
      try {
        const res = await fetch("/api/auth/update", {
          method: "PUT",
          headers: { 
            "Content-Type": "application/json",
            "auth-token": token
          },
          body: JSON.stringify({ name: newName })
        });
        const updated = await res.json();
        if(res.ok) {
          localStorage.setItem('name', updated.name);
          showNotification("Profile updated effectively!");
          loadProfile();
        }
      } catch(err) {
        showNotification("Update failed");
      }
    }

    async function removeFromWishlist(productId) {
      try {
        const res = await fetch(`/api/auth/wishlist/toggle/${productId}`, {
          method: "POST", headers: { "auth-token": token }
        });
        if(res.ok) {
          showNotification("Removed from wishlist");
          loadProfile();
        }
      } catch (err) { }
    }

    async function changePassword() {
      const currentPassword = document.getElementById('cp_current').value;
      const newPassword = document.getElementById('cp_new').value;

      if (!currentPassword || !newPassword) {
        showNotification("Please fill in both password fields.");
        return;
      }
      if (newPassword.length < 6) {
        showNotification("New password must be at least 6 characters.");
        return;
      }

      try {
        const res = await fetch("/api/auth/change-password", {
          method: "PUT",
          headers: { 
            "Content-Type": "application/json",
            "auth-token": token
          },
          body: JSON.stringify({ currentPassword, newPassword })
        });
        
        const data = await res.json();
        if (res.ok) {
          showNotification("Password changed successfully!");
          document.getElementById('cp_current').value = '';
          document.getElementById('cp_new').value = '';
        } else {
          showNotification(data);
        }
      } catch (err) {
        showNotification("Error changing password");
      }
    }

    async function loadOrders() {
      const list = document.getElementById('ordersList');
      try {
        const res = await fetch("/api/orders/my-orders", {
          headers: { "auth-token": token }
        });
        const orders = await res.json();
        
        if(orders.length === 0) {
          list.innerHTML = `<div class="glass" style="padding: 40px; text-align: center;">You haven't placed any orders yet. <br><br><a href="index.html#products" class="btn">Shop Now</a></div>`;
          return;
        }

        let html = '';
        orders.forEach(o => {
          const items = o.items.map(i => `${i.name} (x${i.quantity})`).join(', ');
          const date = new Date(o.createdAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
          
          let statusColor = '#333';
          if(o.status === 'Completed') statusColor = 'var(--primary)';
          if(o.status === 'Processing') statusColor = '#f39c12';
          if(o.status === 'Shipped') statusColor = '#3498db';
          if(o.status === 'Delivered') statusColor = '#2ecc71';

          html += `
            <div class="order-card glass">
              <div>
                <h3 style="margin-bottom: 5px; color:var(--text-dark);">Order #${o._id.substring(18).toUpperCase()}</h3>
                <p style="color:#666; font-size:14px; margin-bottom: 10px;">Placed on ${date}</p>
                <p style="font-size: 15px;"><strong>Items:</strong> ${items}</p>
                <p style="font-size: 15px; margin-top: 5px;"><strong>Delivering to:</strong> ${o.shippingAddress}</p>
              </div>
              <div style="text-align: right;">
                <h2 class="accent-text" style="margin-bottom: 10px;">₹${o.totalAmount}</h2>
                <span class="status-badge" style="background:${statusColor}; color:white; padding:5px 12px; border-radius:15px; font-size:14px;">${o.status}</span>
              </div>
            </div>
          `;
        });
        list.innerHTML = html;
      } catch(err) {
        list.innerHTML = "Failed to load orders.";
      }
    }

    loadProfile();
    loadOrders();
  </script>
</body>
</html>
