<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Cross Interior</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="gradient-bg">

  <nav class="glass-dark" style="background: rgba(0,0,0,0.2); border:none; border-bottom:1px solid rgba(255,255,255,0.1); position:absolute; width:100%;">
    <a href="index.html" class="logo text-light">Cross <span class="accent-text">Interior</span></a>
    <ul>
      <li><a href="login.html" class="text-light">Login</a></li>
    </ul>
  </nav>

  <div class="form-container">
    <div class="form-box glass-dark">
      <h2>Reset <span class="accent-text">Password</span></h2>
      <p style="color:#aaa; margin-bottom: 20px;">Enter your email to set a new password securely.</p>
      
      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="resetEmail" required placeholder="Enter your registered email">
        </div>
        <div class="input-group">
          <label>New Password</label>
          <input type="password" id="newPassword" required placeholder="Enter new password (min. 6 chars)" minlength="6">
        </div>
        <button type="submit" class="btn">Update Password</button>
      </form>
      
      <div class="form-footer" style="margin-top: 20px;">
        Remembered it? <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <div id="notification"></div>

  <script>
    async function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;
      const newPassword = document.getElementById('newPassword').value;

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, newPassword })
        });
        const data = await res.json();

        if (res.ok) {
          showNotification("Password updated successfully!");
          setTimeout(() => {
            window.location = "login.html";
          }, 1500);
        } else {
          showNotification(data, true);
        }
      } catch (err) {
        showNotification("Network error", true);
      }
    }

    function showNotification(msg, isError = false) {
      const notif = document.getElementById('notification');
      notif.textContent = msg;
      notif.style.background = isError ? '#FF4B2B' : '#4FACFE';
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
