<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Cross Interior</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="gradient-bg">

  <nav>
    <a href="index.html" class="logo text-light">Cross <span class="accent-text">Interior</span></a>
    <button class="hamburger" onclick="this.classList.toggle('active'); document.getElementById('navLinks').classList.toggle('mobile-open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul id="navLinks">
      <li><a href="index.html" class="text-light">Back to Shop</a></li>
    </ul>
  </nav>

  <div class="cart-container">
    <h2 style="margin-bottom: 30px;">Your <span class="accent-text">Cart</span></h2>
    <div id="cartItems">
      <p>Your cart is empty.</p>
    </div>
    <div id="cartSummary" style="display:none; margin-top: 30px; padding: 30px; border-top: 1px solid rgba(255,255,255,0.1);">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 20px;">
        <div style="flex:1;">
          <div style="display:flex; gap:10px; margin-bottom: 10px;">
            <input type="text" id="promoCode" placeholder="Promo Code" style="padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:white; font-family:'Outfit';">
            <button class="btn btn-outline" onclick="applyPromo()">Apply</button>
          </div>
          <p id="promoMsg" style="color:var(--primary-light); font-size:14px; margin-bottom: 10px;"></p>
        </div>
        <div style="text-align:right;">
          <h2 style="margin-bottom: 5px;">Total: <span id="cartTotal" class="accent-text">₹0</span></h2>
          <p id="discountTxt" style="color:#2ecc71; display:none; margin-bottom: 10px;">- 10% Applied</p>
        </div>
      </div>
      <div class="cart-summary-row" style="display:flex; justify-content:space-between; align-items:center;">
        <button class="btn btn-outline" style="border-color:#e74c3c; color:#e74c3c;" onclick="clearCart()">Clear Cart</button>
        <a href="checkout.html" class="btn" style="font-size:18px; padding:15px 35px;">Proceed to Checkout</a>
      </div>
    </div>
  </div>

  <div id="notification"></div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function showNotification(msg) {
      const notif = document.getElementById('notification');
      notif.textContent = msg;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 3000);
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      const summary = document.getElementById('cartSummary');

      if (cart.length === 0) {
        container.innerHTML = `<div class="glass-dark" style="padding: 40px; text-align: center; border-radius: 20px;">
          <p style="font-size: 18px; margin-bottom: 20px;">Your cart is empty 🛒</p>
          <a href="index.html" class="btn">Start Shopping</a>
        </div>`;
        summary.style.display = 'none';
        return;
      }

      let html = '';
      let subtotal = 0;
      cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        subtotal += itemTotal;
        html += `
          <div class="cart-item glass-dark" style="border-radius: 16px; margin-bottom: 15px;">
            <img src="${item.image}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1586023492125-27b2c045efd7'">
            <div class="cart-item-info">
              <h3>${item.name}</h3>
              <p style="color: var(--primary-light); font-weight: 600;">₹${item.price}</p>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <button class="btn btn-outline" style="padding:5px 12px;" onclick="changeQty(${index}, -1)">−</button>
              <span style="font-size: 18px; font-weight: 600;">${item.quantity}</span>
              <button class="btn btn-outline" style="padding:5px 12px;" onclick="changeQty(${index}, 1)">+</button>
            </div>
            <div style="text-align:right; min-width: 80px;">
              <p style="font-weight: 700; font-size: 18px;">₹${itemTotal}</p>
              <button style="background:none; border:none; color:#e74c3c; cursor:pointer; margin-top: 5px; font-size:14px;" onclick="removeItem(${index})">Remove</button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      summary.style.display = 'block';
      let finalTotal = discountApplied ? Math.round(subtotal * 0.9) : subtotal;
      document.getElementById('cartTotal').textContent = `₹${finalTotal}`;
      document.getElementById('discountTxt').style.display = discountApplied ? 'block' : 'none';
    }

    let discountApplied = false;
    function applyPromo() {
      const code = document.getElementById('promoCode').value;
      if (code === 'WELCOME10') {
        discountApplied = true;
        document.getElementById('promoMsg').textContent = "10% Discount applied successfully!";
        localStorage.setItem('promoCode', 'WELCOME10');
      } else {
        discountApplied = false;
        document.getElementById('promoMsg').textContent = "Invalid promo code.";
        document.getElementById('promoMsg').style.color = "#e74c3c";
        localStorage.removeItem('promoCode');
        setTimeout(() => {
          document.getElementById('promoMsg').textContent = "";
          document.getElementById('promoMsg').style.color = "var(--primary-light)";
        }, 3000);
      }
      renderCart();
    }

    function clearCart() {
      if(!confirm('Are you sure you want to empty your cart?')) return;
      cart = [];
      discountApplied = false;
      localStorage.removeItem('promoCode');
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      showNotification("Cart cleared");
    }

    function changeQty(index, delta) {
      cart[index].quantity += delta;
      if (cart[index].quantity <= 0) cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      showNotification("Item removed");
    }

    // Check if promo was previously applied
    if (localStorage.getItem('promoCode') === 'WELCOME10') {
      discountApplied = true;
      document.getElementById('promoCode').value = 'WELCOME10';
      document.getElementById('promoMsg').textContent = "10% Discount applied successfully!";
    }

    renderCart();
  </script>
</body>
</html>
