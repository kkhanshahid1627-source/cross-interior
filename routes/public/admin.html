<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Cross Interior</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .dashboard {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 250px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .sidebar button {
      background: transparent;
      border: none;
      color: white;
      text-align: left;
      padding: 12px 15px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .sidebar button:hover, .sidebar button.active {
      background: rgba(255,255,255,0.2);
    }
    .main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    .dashboard-panel {
      display: none;
    }
    .dashboard-panel.active {
      display: block;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body class="gradient-bg">

  <div class="dashboard">
    <div class="sidebar glass-dark" style="border-radius: 0; border-right: 1px solid rgba(255,255,255,0.1);">
      <div style="font-size: 24px; font-weight: 800; margin-bottom: 30px;" class="text-light">Admin<span class="accent-text">Panel</span></div>
      <button class="active" onclick="showPanel('analyticsPanel', this); loadAnalytics()">Analytics</button>
      <button onclick="showPanel('addProductPanel', this)">Add Product</button>
      <button onclick="showPanel('viewProductsPanel', this); loadProducts()">View Products</button>
      <button onclick="showPanel('viewOrdersPanel', this); loadOrders()">View Orders</button>
      <button style="margin-top: auto; color: var(--primary);" onclick="logout()">Logout</button>
    </div>

    <div class="main-content">
      
      <!-- ANALYTICS PANEL -->
      <div id="analyticsPanel" class="dashboard-panel active">
        <h2>Dashboard <span class="accent-text">Analytics</span></h2>
        
        <div style="display: flex; gap: 20px; margin: 30px 0;">
          <div class="glass-dark" style="flex: 1; padding: 30px; border-radius: 12px; text-align: left;">
            <p style="color: #aaa; font-size: 16px; margin-bottom: 10px;">Total Revenue</p>
            <h3 class="accent-text-blue" style="font-size: 36px;" id="totalRevenueStat">₹0</h3>
          </div>
          <div class="glass-dark" style="flex: 1; padding: 30px; border-radius: 12px; text-align: left;">
            <p style="color: #aaa; font-size: 16px; margin-bottom: 10px;">Total Orders</p>
            <h3 style="font-size: 36px;" id="totalOrdersStat">0</h3>
          </div>
        </div>

        <div class="glass-dark" style="padding: 30px; border-radius: 12px;">
          <h3 style="margin-bottom: 20px;">Revenue Over Time</h3>
          <canvas id="revenueChart" style="width: 100%; height: 350px; display: block;"></canvas>
        </div>
      </div>

      <!-- ADD PRODUCT -->
      <div id="addProductPanel" class="dashboard-panel">
        <h2>Add New <span class="accent-text">Product</span></h2>
        <div class="form-box glass-dark" style="text-align: left; max-width: 600px; margin-top:20px; padding:30px;">
          <div class="input-group">
            <label>Product Name</label>
            <input type="text" id="p_name" placeholder="Modern Sofa">
          </div>
          <div class="input-group">
            <label>Price (₹)</label>
            <input type="number" id="p_price" placeholder="18000">
          </div>
          <div class="input-group">
            <label>Image URL</label>
            <input type="text" id="p_image" placeholder="https://images.unsplash.com/...">
          </div>
          <div class="input-group">
            <label>Description</label>
            <input type="text" id="p_desc" placeholder="A comfortable sofa...">
          </div>
          <div class="input-group" style="grid-column: 1/-1;">
            <label>Initial Stock Count</label>
            <input type="number" id="p_stock" min="0" value="10">
          </div>
          <button class="btn" onclick="addProduct()">Add Product</button>
        </div>
      </div>

      <!-- VIEW PRODUCTS -->
      <div id="viewProductsPanel" class="dashboard-panel">
        <h2>Manage <span class="accent-text">Products</span></h2>
        <div class="grid" id="adminProductsGrid">
           <!-- Loaded via JS -->
        </div>
      </div>

      <!-- VIEW ORDERS -->
      <div id="viewOrdersPanel" class="dashboard-panel">
        <h2>Customer <span class="accent-text">Orders</span></h2>
        <div class="grid" id="adminOrdersGrid" style="grid-template-columns: 1fr;">
           <!-- Loaded via JS -->
        </div>
      </div>

    </div>
  </div>

  <div id="notification"></div>

  <script>
    // Security check
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    
    if(!token || role !== 'admin') {
      window.location = "login.html";
    }

    function showPanel(panelId, btnElement) {
      document.querySelectorAll('.dashboard-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
      document.getElementById(panelId).classList.add('active');
      if(btnElement) btnElement.classList.add('active');
    }

    function logout() {
      localStorage.clear();
      window.location = "login.html";
    }

    function showNotification(msg) {
      const notif = document.getElementById('notification');
      notif.textContent = msg;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 3000);
    }

    async function addProduct() {
      const name = document.getElementById('p_name').value;
      const price = document.getElementById('p_price').value;
      const image = document.getElementById('p_image').value;
      const description = document.getElementById('p_desc').value;
      const stock = document.getElementById('p_stock').value;

      try {
        const res = await fetch("/api/products/add", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "auth-token": token
          },
          body: JSON.stringify({ name, price, image, description, stock: Number(stock) })
        });
        
        if (res.ok) {
          showNotification("Product Added Successfully!");
          document.querySelectorAll('input').forEach(i => i.value = '');
        } else {
          showNotification("Failed to add product.");
        }
      } catch(err) {
        showNotification("Error adding product");
      }
    }

    async function loadProducts() {
      const grid = document.getElementById('adminProductsGrid');
      grid.innerHTML = "<p>Loading...</p>";
      try {
        const res = await fetch("/api/products");
        const products = await res.json();
        
        let html = '';
        products.forEach(p => {
          html += `
            <div class="card">
              <img src="${p.image}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
              <h3>${p.name}</h3>
              <p style="color:var(--accent); font-size:18px; font-weight:bold; margin: 10px 0;">₹${p.price}</p>
              <button class="btn btn-outline" style="width:100%" onclick="deleteProduct('${p._id}')">Delete</button>
            </div>
          `;
        });
        grid.innerHTML = html || "<p>No products found.</p>";
      } catch(err) {
        grid.innerHTML = "<p>Error loading products.</p>";
      }
    }

    async function deleteProduct(id) {
      if(!confirm("Are you sure?")) return;
      try {
        await fetch(`/api/products/${id}`, {
          method: "DELETE",
          headers: { "auth-token": token }
        });
        showNotification("Product deleted");
        loadProducts();
      } catch(err) {
        showNotification("Error deleting");
      }
    }

    async function loadOrders() {
      const grid = document.getElementById('adminOrdersGrid');
      grid.innerHTML = "<p>Loading...</p>";
      try {
        const res = await fetch("/api/orders/all", {
          headers: { "auth-token": token }
        });
        const orders = await res.json();
        
        let html = '';
        orders.forEach(o => {
          const itemsList = o.items.map(i => `${i.name} (x${i.quantity})`).join(', ');
          html += `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
              <div>
                <h3 style="color:var(--accent)">Order #${o._id.substring(18)}</h3>
                <p><strong>Customer:</strong> ${o.user.name} (${o.user.email})</p>
                <p><strong>Items:</strong> ${itemsList}</p>
                <p><strong>Address:</strong> ${o.shippingAddress}</p>
                <p><strong>Date:</strong> ${new Date(o.createdAt).toLocaleString()}</p>
              </div>
              <div style="text-align:right;">
                <h2 style="color:var(--primary)">₹${o.totalAmount}</h2>
                <select class="btn btn-outline" style="margin-top:10px; padding:5px; background:#222; color:#fff;" onchange="updateOrderStatus('${o._id}', this.value)">
                  <option value="Completed" ${o.status === 'Completed' ? 'selected' : ''}>Completed</option>
                  <option value="Processing" ${o.status === 'Processing' ? 'selected' : ''}>Processing</option>
                  <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                  <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                </select>
              </div>
            </div>
          `;
        });
        grid.innerHTML = html || "<p>No orders found.</p>";
      } catch(err) {
        grid.innerHTML = "<p>Error loading orders.</p>";
      }
    }

    async function updateOrderStatus(orderId, newStatus) {
      try {
        const res = await fetch(`/api/orders/${orderId}/status`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'auth-token': token
          },
          body: JSON.stringify({ status: newStatus })
        });
        if(res.ok) {
          showNotification("Order status updated!");
        } else {
          showNotification("Failed to update status.");
          loadOrders(); // Revert UI
        }
      } catch (err) {
        showNotification("Error updating status.");
        loadOrders();
      }
    }

    // Load Analytics
    let chartInstance = null;
    async function loadAnalytics() {
      try {
        const res = await fetch("/api/orders/analytics", { headers: { 'auth-token': token } });
        if(!res.ok) throw new Error("Unauthorized");
        
        const data = await res.json();
        document.getElementById('totalRevenueStat').textContent = `₹${data.totalRevenue}`;
        document.getElementById('totalOrdersStat').textContent = data.totalOrders;

        // Prepare chart data
        const dates = Object.keys(data.salesByDate).sort();
        const revenues = dates.map(d => data.salesByDate[d]);

        const ctx = document.getElementById('revenueChart').getContext('2d');
        
        if(chartInstance) chartInstance.destroy(); // Clear old chart
        
        chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: dates.length ? dates : ['No Data'],
            datasets: [{
              label: 'Daily Revenue (₹)',
              data: revenues.length ? revenues : [0],
              borderColor: '#6a11cb',
              backgroundColor: 'rgba(106, 17, 203, 0.2)',
              borderWidth: 3,
              fill: true,
              tension: 0.4 // Smooth curves
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: '#fff' }
              }
            },
            scales: {
              x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
              y: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } }
            }
          }
        });

      } catch (err) {
        showNotification("Failed to load analytics.");
      }
    }

    // Default load
    loadAnalytics();
  </script>
</body>
</html>
